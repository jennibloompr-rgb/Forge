# Netlify build configuration for The Forge.
# Connect this repo in the Netlify dashboard; these settings are picked up
# automatically. The Astro Netlify adapter wires up the /api/unlock function.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Pretty redirect so the editor lives at a friendly path.
[[redirects]]
  from = "/cms"
  to = "/admin/"
  status = 301
